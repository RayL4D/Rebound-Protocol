[plugin]

name="EasyChat"
description="EasyChat is a modular, reusable in-game chat and command console addon for Godot 4. Drop a single custom node into your UI, tune appearance and behaviour with resources, and optionally sync chat over the network when you pair it with LinkUx (LAN / online backends with the same game-side flow)."
author="IUX Games, Isaackiux"
version="2.0.0"
script="plugin.gd"
